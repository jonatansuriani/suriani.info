# Local dev: docker compose up --build
# One-off production build: docker compose run --rm site bundle exec jekyll build
name: suriani

services:
  site:
    build: .
    image: suriani-jekyll:local
    ports:
      - "4000:4000"
    volumes:
      - .:/srv/jekyll
    command: bundle exec jekyll serve --host 0.0.0.0
    environment:
      JEKYLL_ENV: development
